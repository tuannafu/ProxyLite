name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            archive: proxylite-windows-x64.zip
            binary: proxylite.exe

          - name: linux-x64
            os: ubuntu-22.04
            archive: proxylite-linux-x64.tar.gz
            binary: proxylite

          - name: macos-x64
            os: macos-13
            archive: proxylite-macos-x64.tar.gz
            binary: proxylite

          - name: macos-arm64
            os: macos-14
            archive: proxylite-macos-arm64.tar.gz
            binary: proxylite

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Prepare package directory
        shell: bash
        run: |
          mkdir -p package
          cp "target/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
          cp README.md package/
          cp README.vi.md package/

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive -Path package/* -DestinationPath "${{ matrix.archive }}"

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "package/${{ matrix.binary }}"
          tar -czf "${{ matrix.archive }}" -C package .

      - name: Generate checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
          generate_release_notes: true
